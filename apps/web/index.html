<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0e0f13" />
    <title>Cinelog</title>

    <!-- Icons + PWA -->
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <link rel="icon" href="/favicon-32.png" sizes="32x32" type="image/png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black" />
    <meta name="apple-mobile-web-app-title" content="Cinelog" />
    <meta
      name="description"
      content="Track every film, series, anime, and documentary you watch — rate, review, and build your library."
    />
    <!-- Default site embed. Media pages get per-title tags server-side (see the
         API's /api/og routes + nginx crawler routing). -->
    <meta property="og:site_name" content="Cinelog" />
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Cinelog — your personal watch log" />
    <meta
      property="og:description"
      content="Track every film, series, anime, and documentary you watch — rate, review, and build your library."
    />
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="Cinelog — your personal watch log" />
    <meta
      name="twitter:description"
      content="Track every film, series, anime, and documentary you watch — rate, review, and build your library."
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
