# Detect social-media link scrapers by user-agent. These clients don't run JS,
# so for /media/:id we hand them server-rendered Open Graph tags from the API
# instead of the empty SPA shell. Real browsers fall through to the SPA.
map $http_user_agent $is_crawler {
  default 0;
  "~*(facebookexternalhit|Facebot|Twitterbot|Slackbot|Discordbot|WhatsApp|TelegramBot|LinkedInBot|Pinterest|redditbot|Embedly|Googlebot|bingbot|Applebot|SkypeUriPreview|vkShare|W3C_Validator|Iframely)" 1;
}

server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # Docker's embedded DNS — needed so the variable proxy_pass in the /media/
  # crawler branch below can resolve the "api" service name at request time.
  resolver 127.0.0.11 valid=30s ipv6=off;

  # Proxy API + artwork to the API service (same-origin for the browser).
  location /api/ {
    proxy_pass http://api:3000;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # Media pages: crawlers get per-title OG tags from the API; humans get the SPA.
  location ~ ^/media/(?<media_id>[^/]+)$ {
    if ($is_crawler) {
      proxy_pass http://api:3000/api/og/media/$media_id;
    }
    try_files $uri /index.html;
  }

  # PWA: correct MIME for the manifest, and don't let the service worker get
  # stuck in an HTTP cache (browsers must see updates to re-register it).
  location = /manifest.webmanifest {
    default_type application/manifest+json;
  }
  location = /sw.js {
    add_header Cache-Control "no-cache";
  }

  # SPA fallback: every other path serves index.html.
  location / {
    try_files $uri $uri/ /index.html;
  }
}
